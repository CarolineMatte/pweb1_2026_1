<!DOCTYPE html>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="bg-light py-3 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo">
                <img src="../img/logo.png" alt="Logomarca" height="100" class="rounded-circle">
            </div>
            <nav class="navbar navbar-expand-lg navbar-light">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobre.html">SOBRE</a></li>
                    <li class="nav-item"><a class="nav-link" href="destinos.html">DESTINOS</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contato.html">CONTATO</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div class="row">
            <article class="col-md-6 mb-4">
                <h2>Fale Conosco</h2>
                <p>Tire suas dúvidas ou peça um orçamento personalizado.</p>

                <form action="#" class="p-4 border rounded bg-light">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="mensagem" class="form-label">Mensagem</label>
                        <textarea class="form-control" id="mensagem" rows="4" placeholder="Como podemos ajudar?"
                            required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Enviar Mensagem</button>
                </form>
            </article>

            <aside class="col-md-6">
                <h2>Nossa Localização</h2>
                <p>Visite nossa agência física.</p>
                <div class="ratio ratio-16x9 border rounded shadow-sm overflow-hidden">
                    <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-52.600865364074714%2C-27.13815366009956%2C-52.59840309619904%2C-27.136585440930958&amp;layer=mapnik" style="border: 0"></iframe>
                </div>
                <div class="mt-3">
                    <small>
                        <a href="https://www.openstreetmap.org/?#map=18/-27.137667/-52.600501" target="_blank"
                            class="text-muted">Ver mapa ampliado</a>
                    </small>
                </div>
            </aside>
        </div>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <nav class="mb-3">
                <a href="#" class="text-white mx-2">TRABALHE CONOSCO</a>
                <a href="contato.html" class="text-white mx-2">CONTATO</a>
            </nav>
            <div class="social-links">
                <span>SIGA-NOS:</span>
                <a href="#" class="text-white ms-2"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-white ms-2"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
